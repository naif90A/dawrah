<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الاشتراك | منصة أوهام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #020617; 
            color: white; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            overflow-x: hidden;
        }

        .ambient-bg { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at 50% 100%, #1e293b 0%, #020617 80%); 
            z-index: -1; 
        }

        .electric-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            position: relative;
        }

        /* تأثير الالتماس الكهربائي للنصوص */
        .electric-text {
            color: #fff;
            text-shadow: 0 0 10px #3b82f6;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0%, 100% { opacity: 1; }
            95% { opacity: 1; text-shadow: 0 0 10px #3b82f6; }
            96% { opacity: 0.7; text-shadow: none; }
            97% { opacity: 1; text-shadow: 0 0 20px #ff0000; }
            98% { opacity: 0.8; }
        }

        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; margin-right: 5px; }
        
        .input-style {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; width: 100%; padding: 14px; border-radius: 15px; margin-bottom: 20px;
            outline: none; transition: 0.3s;
        }
        .input-style:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        /* سداد المضيء والقابل للنسخ */
        .sadad-container {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(30, 58, 138, 0.4));
            border: 2px dashed #3b82f6;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .sadad-container:hover { background: rgba(59, 130, 246, 0.2); transform: scale(1.02); }
        .sadad-number { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; color: #60a5fa; }

        /* زر إرفاق الملف */
        .file-upload {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            padding: 15px; border-radius: 15px; text-align: center;
            cursor: pointer; margin-bottom: 25px; transition: 0.3s;
        }
        .file-upload:hover { background: rgba(255, 255, 255, 0.05); border-color: #94a3b8; }

        .btn-buy {
            background: #3b82f6;
            color: white; width: 100%; padding: 18px; border-radius: 18px;
            font-weight: 900; font-size: 1.2rem; transition: 0.4s;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
        .btn-buy:hover { transform: translateY(-3px); box-shadow: 0 0 30px #3b82f6; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div id="payment-card" class="electric-card">
        <h2 class="text-2xl font-black text-center mb-6 electric-text">تأكيد عملية الشراء</h2>
        
        <div class="input-group text-right">
            <label>الاسم الكامل</label>
            <input type="text" class="input-style" placeholder="أدخل اسمك هنا">

            <label>رقم الجوال</label>
            <input type="tel" class="input-style text-left" placeholder="05xxxxxxxx" dir="ltr">

            <label>رقم حساب سداد (اضغط للنسخ)</label>
            <div class="sadad-container text-center" onclick="copySadad()">
                <span class="text-[10px] block text-blue-300 mb-1 uppercase tracking-widest">SADAD ACCOUNT</span>
                <span id="sadad-num" class="sadad-number">82492135384</span>
                <div id="copy-msg" class="text-[9px] text-green-400 mt-2 opacity-0 transition-all">تم النسخ بنجاح!</div>
            </div>

            <label>إرفاق صورة التحويل (إيصال السداد)</label>
            <div class="file-upload" onclick="document.getElementById('file-input').click()">
                <span class="text-sm text-slate-400" id="file-name">اضغط هنا لإرفاق الملف 📎</span>
                <input type="file" id="file-input" class="hidden" onchange="updateFileName(this)">
            </div>
        </div>

        <button onclick="processOrder()" class="btn-buy">تأكيد الشراء الآن</button>
    </div>

    <div id="success-card" class="electric-card hidden text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(34,197,94,0.4)]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h2 class="text-3xl font-black mb-4 electric-text">تم تأكيد الطلب!</h2>
        <div class="text-slate-300 space-y-4 text-sm leading-relaxed mb-8">
            <p>شكراً لثقتكم بـ <span class="text-blue-400 font-bold">منصة أوهام</span>.</p>
            <p>تم استلام بياناتك وإيصال التحويل بنجاح. سيقوم القسم التقني بمراجعة الطلب وتفعيل حسابك فوراً.</p>
            <p class="bg-blue-500/10 p-3 rounded-lg border border-blue-500/20 text-blue-300">
                سيصلك رد عبر <span class="font-bold">الواتساب</span> خلال دقائق قليلة.
            </p>
        </div>
        <button onclick="location.href='index.html'" class="text-xs text-slate-500 underline hover:text-white transition-all">العودة للمنصة الرئيسية</button>
    </div>

    <script>
        // دالة النسخ
        function copySadad() {
            const num = document.getElementById('sadad-num').innerText;
            navigator.clipboard.writeText(num);
            const msg = document.getElementById('copy-msg');
            msg.style.opacity = '1';
            setTimeout(() => msg.style.opacity = '0', 2000);
        }

        // تحديث اسم الملف عند الرفع
        function updateFileName(input) {
            const name = input.files[0] ? input.files[0].name : "اضغط هنا لإرفاق الملف 📎";
            document.getElementById('file-name').innerText = name;
            document.getElementById('file-name').classList.add('text-blue-400');
        }

        // معالجة الطلب
        function processOrder() {
            document.getElementById('payment-card').classList.add('hidden');
            document.getElementById('success-card').classList.remove('hidden');
            
            // تأثير نبض خفيف عند النجاح
            document.body.style.backgroundColor = "#064e3b";
            setTimeout(() => {
                document.body.style.backgroundColor = "#020617";
            }, 500);
        }
    </script>
</body>
</html>
