<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OXR | إتمام الطلب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: screen; margin: 0; }
        .magma { position: fixed; inset: 0; background: radial-gradient(circle at 50% 100%, #450a0a, #050000); z-index: -1; }
        .card { background: rgba(20, 5, 5, 0.8); backdrop-filter: blur(15px); border: 1px solid #ff450033; padding: 40px; border-radius: 30px; width: 100%; max-width: 450px; text-align: center; }
        .loader { font-size: 50px; animation: spin 2s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="magma"></div>

    <div class="card" id="box">
        <h1 id="title" class="text-2xl font-black text-orange-500 mb-6">تأكيد الشراء</h1>
        
        <div id="info" class="bg-white/5 p-4 rounded-xl mb-6">
            <p class="text-sm">المنتج: <span id="p-name" class="font-bold text-white">-</span></p>
            <p class="text-sm">السعر: <span id="p-price" class="font-bold text-orange-500">-</span></p>
        </div>

        <input type="text" id="r-user" class="w-full p-3 rounded-lg bg-white/10 border border-orange-500/30 mb-4 text-center font-bold text-orange-400" readonly>
        
        <p class="text-[10px] text-slate-500 mb-6">* بعد إتمام الشراء، سيصلك معلومات الحساب فوراً هنا.</p>

        <button onclick="pay()" id="btn" class="w-full py-4 bg-gradient-to-r from-orange-600 to-red-700 rounded-xl font-bold shadow-lg shadow-red-900/40">إتمام الدفع</button>
        
        <div id="loading" class="mt-4">
            <div class="loader" id="clock">⌛</div>
            <p id="timer" class="hidden text-orange-500 font-bold mt-2">03:00</p>
        </div>
    </div>

    <script>
        // قراءة البيانات وتوليد يوزر
        const params = new URLSearchParams(window.location.search);
        document.getElementById('p-name').innerText = params.get('item') || 'منتج';
        document.getElementById('p-price').innerText = (params.get('price') || '0') + ' ريال';
        
        const user = Math.random().toString(36).substring(2, 5); // يوزر عشوائي 3 رموز
        document.getElementById('r-user').value = user;

        function pay() {
            document.getElementById('title').innerText = "جاري المعالجة...";
            document.getElementById('btn').style.display = 'none';
            document.getElementById('clock').style.display = 'inline-block';
            document.getElementById('timer').classList.remove('hidden');

            let time = 180;
            const run = setInterval(() => {
                time--;
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('timer').innerText = `0${m}:${s < 10 ? '0'+s : s}`;
                
                if(time <= 0) {
                    clearInterval(run);
                    document.getElementById('box').innerHTML = `
                        <h1 class="text-3xl text-green-500 font-black">✅ تم الشراء</h1>
                        <div class="bg-white/5 p-6 rounded-2xl mt-4 text-left font-mono">
                            <p>User: <span class="text-green-400">${user}</span></p>
                            <p>Pass: OXR_9982</p>
                        </div>
                        <button onclick="location.href='index.html'" class="mt-6 text-slate-500 underline text-sm">العودة</button>
                    `;
                }
            }, 1000);
        }
    </script>
</body>
</html>
