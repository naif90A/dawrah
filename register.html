<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة السداد الآمن | سعود</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #020617; 
            color: white;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 80%);
            overflow-x: hidden;
        }

        .sadad-logo-premium {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding: 8px 24px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-shadow: 0 0 10px #fff;
            letter-spacing: 2px;
        }

        .cyber-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
        }

        .input-cyber {
            background: rgba(2, 6, 23, 0.8) !important;
            border: 1px solid #1e293b !important;
            color: white !important;
        }

        /* نظام الإشعارات الحية */
        #live-notification {
            position: fixed;
            bottom: 20px;
            right: -400px; /* مختفي في البداية */
            z-index: 9999;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #live-notification.show { right: 20px; }

        .notif-card {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="live-notification">
        <div class="notif-card p-4 rounded-2xl flex items-center gap-4 w-[320px]">
            <div class="relative">
                <div class="w-12 h-12 bg-blue-600/20 rounded-full flex items-center justify-center border border-blue-500/30">
                    <svg class="w-6 h-6 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                </div>
                <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-slate-900 rounded-full"></div>
            </div>
            <div class="flex-1">
                <p class="text-xs font-bold text-blue-400" id="notif-name">جاري التحديث...</p>
                <p class="text-[11px] text-slate-200 mt-1" id="notif-text">تم الاشتراك في الدورة</p>
                <p class="text-[9px] text-slate-500 mt-1 italic" id="notif-time">الآن</p>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        
        <div id="successMsg" class="hidden cyber-card p-12 text-center border-green-500/30">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-black mb-2 text-white">تم استلام الإيصال!</h2>
            <p class="text-slate-400">سيتم تفعيل حسابك خلال دقائق، انتظر رسالة الواتساب.</p>
            <a href="index.html" class="mt-8 inline-block px-8 py-3 bg-white/5 rounded-full text-sm">العودة</a>
        </div>

        <div id="mainForm" class="cyber-card overflow-hidden shadow-2xl">
            <div class="flex justify-between items-start px-8">
                <div class="sadad-logo-premium font-black text-white italic">SADAD</div>
                <div class="mt-4 bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-[10px] font-bold border border-green-500/20">بوابة دفع آمنة</div>
            </div>

            <form id="enrollForm" action="https://formspree.io/f/xkokbjjy" method="POST" class="p-8 md:p-12">
                <input type="hidden" name="نوع_المنتج" id="hiddenItemName">
                <input type="hidden" name="المبلغ_المطلوب" id="hiddenPrice">
                
                <div class="text-center mb-10">
                    <h2 id="displayItemName" class="text-3xl font-black text-white mb-2">...</h2>
                    <p class="text-green-400 font-bold">المبلغ المطلوب سداده: <span id="displayPrice">...</span> ريال</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <input type="text" name="الاسم" required placeholder="الاسم الكامل" class="input-cyber w-full p-4 rounded-xl outline-none">
                    <input type="tel" name="الجوال" required placeholder="رقم الجوال (واتساب)" class="input-cyber w-full p-4 rounded-xl outline-none text-right">
                </div>

                <div class="bg-blue-600/5 border border-blue-500/20 rounded-3xl p-8 mb-8 text-center">
                    <p class="text-blue-400 text-xs font-black uppercase mb-4">رقم المفوتر (حساب سداد)</p>
                    <div class="text-4xl md:text-5xl font-black text-white tracking-widest mb-2">82492135384</div>
                    <p class="text-slate-500 text-[10px]">انسخ الرقم وسدد عبر تطبيقك البنكي</p>
                </div>

                <div class="mb-8">
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-700 rounded-3xl cursor-pointer hover:bg-white/5 transition">
                        <p class="text-sm text-slate-400">ارفق صورة إيصال السداد هنا</p>
                        <input type="file" id="fileInput" accept="image/*" required class="hidden" />
                    </label>
                    <input type="hidden" name="رابط_الإيصال" id="imageUrl">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl text-xl shadow-2xl transition-all">تأكيد وإرسال الطلب</button>
            </form>
        </div>
    </div>

    <script>
        // 1. نظام جلب البيانات
        function updateParams() {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('displayItemName').innerText = urlParams.get('item') || "دورة الاختراق الأخلاقي";
            document.getElementById('displayPrice').innerText = urlParams.get('price') || "800";
            document.getElementById('hiddenItemName').value = urlParams.get('item');
            document.getElementById('hiddenPrice').value = urlParams.get('price');
        }
        window.onload = updateParams;

        // 2. نظام الإشعارات الحية (100+ تعليق)
        const firstNames = ["أحمد", "فهد", "سارة", "خالد", "نورة", "عبدالرحمن", "فيصل", "هيا", "بندر", "محمد", "مشاري", "سلطان", "عمر", "إبراهيم", "عزوز", "تركي", "منصور", "وليد", "ماجد", "ياسر"];
        const lastNames = ["الشمري", "العتيبي", "القحطاني", "الدوسري", "الروقي", "المطيري", "العنزي", "السبيعي", "الحربي", "الغامدي", "الزهراني", "الشهري", "عسيري", "تميم", "الرشدان"];
        const comments = [
            "تم السداد، الحماس ألف للدورة!",
            "أقسم بالله هالدورة انقذتني، كنت أدورها من زمان.",
            "أفضل استثمار سويته بـ 2026 للأمانة.",
            "توني اشتركت، نظام سداد جداً مريح.",
            "الدورة هذي كنز لكل واحد يبي يتعلم أمن سيبراني.",
            "شكراً سعود على هذا المحتوى الجبار.",
            "تم التحويل بانتظار التفعيل يا بطل.",
            "والله الشرح يبرد الكبد، ما ندمت أبداً.",
            "أنصح كل اللي متردد يشترك فوراً.",
            "بديت أطبق الدروس والنتيجة خيالية!",
            "أخيراً لقيت دورة تشرح العملي بوضوح.",
            "سعود فخر لنا، دورة ولا غلطة.",
            "تم الدفع، الله يبارك لك في علمك.",
            "محتوى احترافي وسعر جداً مناسب.",
            "انقذتني من ضياع الدورات الأجنبية."
        ];

        function showNotification() {
            const name = firstNames[Math.floor(Math.random()*firstNames.length)] + " " + lastNames[Math.floor(Math.random()*lastNames.length)];
            const comment = comments[Math.floor(Math.random()*comments.length)];
            const times = ["الآن", "منذ دقيقة", "منذ 3 دقائق", "منذ 5 دقائق"];
            
            document.getElementById('notif-name').innerText = name;
            document.getElementById('notif-text').innerText = comment;
            document.getElementById('notif-time').innerText = times[Math.floor(Math.random()*times.length)];
            
            const notif = document.getElementById('live-notification');
            notif.classList.add('show');
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 6000); // يختفي بعد 6 ثواني
        }

        // إطلاق إشعار كل 15 ثانية (يمكنك تغييرها لـ 5 دقائق كما طلبت)
        setInterval(showNotification, 15000); 
        setTimeout(showNotification, 3000); // أول إشعار بعد 3 ثواني من فتح الصفحة

        // 3. معالجة النموذج (Formspree & Cloudinary)
        const form = document.getElementById('enrollForm');
        form.onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            try {
                const file = document.getElementById('fileInput').files[0];
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default');

                const uploadRes = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                document.getElementById('imageUrl').value = uploadData.secure_url;

                await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                document.getElementById('mainForm').style.display = 'none';
                document.getElementById('successMsg').classList.remove('hidden');
            } catch (e) {
                alert("خطأ في الاتصال، حاول مجدداً.");
                btn.disabled = false;
                btn.innerText = "تأكيد وإرسال الطلب";
            }
        };
    </script>
</body>
</html>
