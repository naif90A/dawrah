<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام العملية | منصة أ. سعود</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #050000; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .magma-bg { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at 50% 100%, #450a0a, #050000); 
            z-index: -1; 
        }

        .checkout-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 69, 0, 0.2);
            padding: 40px;
            border-radius: 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .input-label { font-size: 13px; color: #94a3b8; margin-right: 5px; margin-bottom: 5px; display: block; }
        
        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }
        .input-field:focus { border-color: #ff0000; background: rgba(255, 0, 0, 0.02); }

        /* شاشة الدخان والانتظار */
        #smoke-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .smoke-icon {
            font-size: 80px;
            animation: smoke-rise 1.5s infinite ease-out;
            filter: blur(4px);
            opacity: 0.6;
        }

        @keyframes smoke-rise {
            0% { transform: translateY(20px) scale(1); opacity: 0.7; filter: blur(2px); }
            100% { transform: translateY(-60px) scale(2.5); opacity: 0; filter: blur(10px); }
        }

        .btn-confirm {
            background: #ffffff;
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 1.1rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-confirm:hover { transform: scale(1.02); background: #f0f0f0; }

        .success-box {
            display: none;
            text-align: center;
        }
        
        .data-display {
            background: rgba(0, 255, 0, 0.05);
            border: 1px dashed rgba(0, 255, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            font-family: monospace;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="magma-bg"></div>

    <div id="payment-box" class="checkout-card">
        <h2 class="text-2xl font-black text-center mb-6">إتمام عملية الشراء</h2>
        
        <div class="bg-white/5 p-4 rounded-2xl mb-8 border border-white/5 text-sm">
            <div class="flex justify-between mb-1 text-slate-400">
                <span>الطلب:</span>
                <span id="p-name" class="text-white font-bold">-</span>
            </div>
            <div class="flex justify-between">
                <span>المبلغ:</span>
                <span id="p-price" class="text-red-500 font-black">-</span>
            </div>
            <div class="mt-3 pt-3 border-t border-white/5 text-[11px] text-green-500 font-bold">
                ✓ فحص الأمان: الحساب سليم ونظيف 100%
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">الاسم بالكامل</label>
            <input type="text" class="input-field" placeholder="أدخل اسمك الثلاثي">

            <label class="input-label">رقم الجوال (واتساب)</label>
            <input type="tel" class="input-field text-left" placeholder="05xxxxxxxx" dir="ltr">

            <label class="input-label">رقم حساب سداد / البطاقة</label>
            <input type="text" class="input-field text-left" placeholder="رقم حسابك للتحقق" dir="ltr">

            <label class="input-label">اليوزر المستهدف (توليد تلقائي)</label>
            <input type="text" id="r-user" class="input-field bg-white/5 text-orange-500 font-bold text-center" readonly>
        </div>

        <button onclick="processPayment()" class="btn-confirm mt-4">تأكيد واتمام الشراء</button>
    </div>

    <div id="smoke-overlay">
        <div class="smoke-icon">💨</div>
        <h2 class="text-xl font-black mt-8 text-white">جاري التحقق من البيانات...</h2>
        <p class="text-slate-500 mt-2">ستصلك معلومات الحساب فوراً بعد التأكد</p>
    </div>

    <div id="success-screen" class="checkout-card success-box">
        <div class="text-6xl mb-6 text-green-500">✅</div>
        <h2 class="text-2xl font-black mb-2">تم الشراء بنجاح!</h2>
        <p class="text-slate-400 text-sm mb-8">وافق النظام على طلبك، إليك بيانات الحساب:</p>
        
        <div class="data-display space-y-4">
            <div>
                <span class="text-slate-500 block text-[10px] uppercase">User:</span>
                <span id="final-user" class="text-green-400 text-xl font-bold">--</span>
            </div>
            <div class="pt-2 border-t border-white/5">
                <span class="text-slate-500 block text-[10px] uppercase">Password:</span>
                <span class="text-green-400 text-xl font-bold">OXR_SA_2026</span>
            </div>
        </div>

        <button onclick="location.href='index.html'" class="mt-10 text-slate-500 text-xs underline">العودة للرئيسية</button>
    </div>

    <script>
        // قراءة بيانات المنتج واليوزر العشوائي
        const urlParams = new URLSearchParams(window.location.search);
        const itemName = urlParams.get('item') || 'منتج مميز';
        const itemPrice = urlParams.get('price') || '0';
        
        // توليد يوزر عشوائي (3 رموز)
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789_';
        let randomUser = chars.charAt(Math.floor(Math.random() * chars.length)) + 
                         chars.charAt(Math.floor(Math.random() * chars.length)) + 
                         chars.charAt(Math.floor(Math.random() * chars.length));

        document.getElementById('p-name').innerText = itemName;
        document.getElementById('p-price').innerText = itemPrice + " ريال";
        document.getElementById('r-user').value = randomUser;
        document.getElementById('final-user').innerText = randomUser;

        function processPayment() {
            // إخفاء الواجهة وإظهار الدخان
            document.getElementById('payment-box').style.display = 'none';
            document.getElementById('smoke-overlay').style.display = 'flex';

            // انتظار 3 ثواني (محاكاة التأكد)
            setTimeout(() => {
                document.getElementById('smoke-overlay').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
