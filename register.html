<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | OXR Secured Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050000;
            color: white;
            overflow-x: hidden;
        }

        .magma-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 100%, #450a0a 0%, #050000 80%);
            z-index: -1;
        }

        /* حاوية الدفع الزجاجية المحترقة */
        .checkout-card {
            background: rgba(20, 5, 5, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 69, 0, 0.2);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .checkout-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, #ff4500, transparent);
            animation: rotate-border 6s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 69, 0, 0.2);
            color: white;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #ff4500;
            background: rgba(255, 69, 0, 0.1);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.2);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #ff4500 0%, #b91c1c 100%);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px #b91c1c; }
            50% { box-shadow: 0 0 25px #ff4500; transform: scale(1.02); }
        }

        .status-badge {
            background: rgba(255, 69, 0, 0.1);
            color: #ff4500;
            border: 1px solid #ff4500;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="magma-bg"></div>

    <div class="checkout-card w-full max-w-lg rounded-[2.5rem] p-8 md:p-12">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">تأكيد الطلب</h1>
            <div class="flex justify-center mt-4">
                <span class="status-badge tracking-widest uppercase">OXR SECURED GATEWAY</span>
            </div>
        </div>

        <div class="bg-white/5 rounded-2xl p-6 mb-8 border border-white/10">
            <div class="flex justify-between items-center mb-2">
                <span class="text-slate-400 text-sm">الخدمة المختارة:</span>
                <span id="product-name" class="font-bold text-xl text-white">جاري التحميل...</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-slate-400 text-sm">إجمالي المبلغ:</span>
                <span id="product-price" class="font-black text-2xl text-orange-500">0 ريال</span>
            </div>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 mr-2 uppercase">الاسم الكامل</label>
                <input type="text" placeholder="أدخل اسمك الثلاثي" class="input-field w-full py-4 px-6 rounded-2xl" required>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 mr-2 uppercase">رقم الجوال (واتساب)</label>
                <input type="tel" placeholder="05xxxxxxxx" class="input-field w-full py-4 px-6 rounded-2xl text-left" dir="ltr" required>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 mr-2 uppercase">اليوزر المستهدف (إن وجد)</label>
                <input type="text" placeholder="@example" class="input-field w-full py-4 px-6 rounded-2xl text-left" dir="ltr">
            </div>

            <div class="pt-4 text-center">
                <p class="text-[10px] text-slate-500 mb-6 px-4 leading-relaxed">بضغطك على تأكيد الطلب، سيتم توجيهك مباشرة لقسم الدفع النهائي لمعالجة طلبك فوراً.</p>
                
                <button type="submit" class="btn-confirm w-full py-5 rounded-2xl text-lg font-black text-white shadow-2xl transition-all">
                    تأكيد وإتمام الدفع
                </button>
                
                <a href="index.html" class="inline-block mt-6 text-slate-500 hover:text-white text-sm transition-all border-b border-transparent hover:border-white">
                    ← العودة للمتجر
                </a>
            </div>
        </form>
    </div>

    <script>
        // سكربت ذكي لقراءة البيانات من الرابط (URL)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const itemName = urlParams.get('item');
            const itemPrice = urlParams.get('price');

            if (itemName) {
                document.getElementById('product-name').textContent = itemName;
            }
            if (itemPrice) {
                document.getElementById('product-price').textContent = itemPrice + " ريال";
            }
        };
    </script>
</body>
</html>
