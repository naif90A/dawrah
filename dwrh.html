<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center h-screen">
    <div class="bg-slate-900 p-8 rounded-3xl border border-blue-500/20 w-80">
        <h2 class="text-center mb-6 font-bold">بوابة المشتركين</h2>
        <input type="text" id="user" placeholder="رقم الجوال" class="w-full p-3 mb-4 rounded-xl bg-black border border-slate-800 text-white outline-none">
        <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-3 mb-6 rounded-xl bg-black border border-slate-800 text-white outline-none">
        <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-xl font-bold">دخول</button>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            // استبدل الرقم والباسورد بما تريد
            if(u === "0500000000" && p === "123456") {
                localStorage.setItem('isLogged', 'true');
                localStorage.setItem('userPhone', u); // لحفظ رقم المشترك للعلامة المائية
                window.location.href = "dwrh.html"; // سينقلك للصفحة ولن تطردك
            } else {
                alert("بيانات خاطئة");
            }
        }
    </script>
</body>
</html>
