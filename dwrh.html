<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الوصول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="bg-slate-900/50 p-10 rounded-[2.5rem] border border-blue-500/20 shadow-2xl w-full max-w-sm">
        <h2 class="text-2xl font-black text-white text-center mb-8 italic">تسجيل دخول</h2>
        
        <input type="text" id="u" placeholder="رقم الجوال" class="w-full bg-black/50 border border-slate-800 p-4 rounded-2xl text-white mb-4 outline-none focus:border-blue-500">
        <input type="password" id="p" placeholder="كلمة المرور" class="w-full bg-black/50 border border-slate-800 p-4 rounded-2xl text-white mb-8 outline-none focus:border-blue-500">
        
        <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all">دخول</button>
    </div>

    <script>
        function doLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            // عدل البيانات هنا كما تحب
            if(user === "0500000000" && pass === "1234") {
                localStorage.setItem('isLogged', 'true');
                localStorage.setItem('userPhone', user);
                window.location.href = "dwrh.html"; // تأكد أن الاسم مطابق لملفك في قيت هاب
            } else {
                alert("البيانات غير صحيحة");
            }
        }
    </script>
</body>
</html>
