<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أ. سعود | OXR Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #020617; /* لون كحلي غامق جداً لمنع اللون الأصفر */
            color: white; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden; 
        }

        /* خلفية بركانية احترافية */
        .ambient-bg { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at 50% -20%, #450a0a 0%, #020617 80%); 
            z-index: -1; 
        }

        /* شعار أ. سعود */
        .brand-logo { 
            font-size: clamp(3rem, 10vw, 6rem); 
            font-weight: 900; 
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            line-height: 1;
        }
        .brand-logo span { color: #ff0000; }

        /* الأزرار الحيوية */
        .btn-action {
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-white { background: #ffffff; color: #000; }
        .btn-red { background: #ff0000; color: #fff; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        .btn-action:hover { transform: translateY(-3px); opacity: 0.9; }

        /* كروت المنتجات */
        .p-card { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 2rem; 
            border-radius: 1.5rem;
            text-align: center;
            transition: 0.3s;
        }
        .p-card:hover { border-color: #ff0000; transform: scale(1.02); }

        /* شريط المعلومات */
        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: absolute;
            top: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="top-nav">
        <div class="bg-black/50 px-4 py-2 rounded-xl border border-white/10">
            <span class="text-xs text-slate-400 block">الزوار</span>
            <span id="counter" class="text-xl font-black text-white">0</span> <span class="text-red-500">🔥</span>
        </div>
        <div class="text-left bg-black/50 px-4 py-2 rounded-xl border border-white/10">
            <div class="text-yellow-500 text-xs">★★★★★</div>
            <span class="text-[10px] text-slate-400 uppercase tracking-tighter">Verified Store</span>
        </div>
    </div>

    <header class="text-center pt-40 pb-16 px-4">
        <h1 class="brand-logo">أ. <span>سعود</span></h1>
        <p class="text-slate-500 mt-2 text-sm tracking-widest uppercase">Expert Technical Services</p>
        
        <div class="flex justify-center gap-4 mt-10">
            <a href="#store" class="btn-action btn-white">
                المتجر
            </a>
            <a href="register.html?item=اشتراك الدورة&price=800" class="btn-action btn-red">
                اشتراك الدورة
            </a>
        </div>
    </header>

    <main id="store" class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-32">
        <div class="p-card">
            <div class="text-4xl mb-4">🎵</div>
            <h2 class="text-xl font-bold">تيك توك ثنائي</h2>
            <div class="text-2xl font-black text-red-500 my-4">350 ريال</div>
            <a href="register.html?item=تيك توك ثنائي&price=350" class="block w-full py-3 bg-white/5 rounded-xl border border-white/10 font-bold hover:bg-red-600 transition-all">طلب الخدمة</a>
        </div>

        <div class="p-card">
            <div class="text-4xl mb-4">📸</div>
            <h2 class="text-xl font-bold">إنستقرام ثنائي</h2>
            <div class="text-2xl font-black text-red-500 my-4">390 ريال</div>
            <a href="register.html?item=إنستقرام ثنائي&price=390" class="block w-full py-3 bg-white/5 rounded-xl border border-white/10 font-bold hover:bg-red-600 transition-all">طلب الخدمة</a>
        </div>

        <div class="p-card">
            <div class="text-4xl mb-4">👻</div>
            <h2 class="text-xl font-bold">فك حظر سناب</h2>
            <div class="text-2xl font-black text-red-500 my-4">150 ريال</div>
            <a href="register.html?item=فك حظر سناب&price=150" class="block w-full py-3 bg-white/5 rounded-xl border border-white/10 font-bold hover:bg-red-600 transition-all">طلب الخدمة</a>
        </div>
    </main>

    <script>
        // عداد زوار بسيط ومضمون
        let count = 0;
        const target = 237;
        const speed = 10; 
        const timer = setInterval(() => {
            count++;
            document.getElementById('counter').innerText = count;
            if (count >= target) clearInterval(timer);
        }, speed);
    </script>
</body>
</html>
