<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>تسجيل الدخول | أكاديمية نايف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #020617; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 85%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="p-4">

    <div class="login-card w-full max-w-md p-8 md:p-12 rounded-[3rem] text-center">
        <div class="w-20 h-20 bg-blue-600/20 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-blue-500/20 shadow-inner">
            <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>

        <h1 class="text-3xl font-black text-white mb-2 italic tracking-tighter">مرحباً بك مجدداً</h1>
        <p class="text-slate-400 text-sm mb-10">الرجاء إدخال بيانات الاشتراك للوصول للدورة</p>

        <div class="space-y-5">
            <div class="text-right">
                <label class="text-xs text-slate-500 mr-4 mb-2 block">رقم الجوال</label>
                <input type="text" id="userInput" placeholder="05xxxxxxxx" 
                    class="w-full bg-black/40 border border-slate-800 p-4 rounded-2xl text-white outline-none text-center font-bold tracking-widest">
            </div>

            <div class="text-right">
                <label class="text-xs text-slate-500 mr-4 mb-2 block">كلمة المرور</label>
                <input type="password" id="passInput" placeholder="••••••••" 
                    class="w-full bg-black/40 border border-slate-800 p-4 rounded-2xl text-white outline-none text-center font-bold">
            </div>

            <button onclick="handleLogin()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-blue-600/20 mt-6 active:scale-95">
                دخول المنصة
            </button>
        </div>

        <p class="mt-10 text-xs text-slate-600">تواجه مشكلة؟ تواصل مع الدعم الفني</p>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            // --- هنا تضع بيانات الدخول التي تريدها ---
            const correctUser = "0500000000"; 
            const correctPass = "1234"; 

            if(user === correctUser && pass === correctPass) {
                // حفظ جلسة الدخول في المتصفح
                localStorage.setItem('isLogged', 'true');
                localStorage.setItem('userPhone', user);
                
                // الانتقال إلى صفحة الكورسات التي سميتها أنت
                window.location.href = "courses.html"; 
            } else {
                alert("بيانات الدخول غير صحيحة، تأكد من الرقم وكلمة المرور.");
            }
        }

        // السماح بالدخول عند الضغط على زر Enter
        document.onkeydown = function(e) {
            if(e.key === "Enter") handleLogin();
        };
    </script>
</body>
</html>
