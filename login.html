<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المشتركين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #020617; 
            font-family: 'Tajawal', sans-serif;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-height-screen p-6">

    <div class="max-w-md w-full bg-slate-900/80 backdrop-blur-xl p-10 rounded-[2.5rem] border border-blue-500/20 shadow-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-white italic">بوابة المشتركين</h2>
            <p class="text-slate-500 text-sm mt-2">يرجى إدخال بيانات الوصول المرسلة لك</p>
        </div>

        <div class="space-y-6">
            <input type="text" id="username" placeholder="رقم الجوال (اليوزر)" class="w-full bg-black/50 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-black/50 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-blue-500">
            
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all">
                دخول إلى المنصة
            </button>
        </div>
        <p id="error" class="text-red-500 text-xs text-center mt-4 hidden text-italic">بيانات الدخول غير صحيحة، تواصل مع الدعم.</p>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // هنا تضع اليوزر والباسورد الذي تريد تفعيله للمشترك
            // يمكنك تغيير هذه القيم لكل مشترك أو عمل قائمة بهم
            if(user === "0500000000" && pass === "saud2026") {
                // حفظ جلسة الدخول في المتصفح
                localStorage.setItem('isLogged', 'true');
                window.location.href = "dawra.html";
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
